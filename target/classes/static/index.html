<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="/css/app.css">
	<link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>
<body>
	<div id="app" class="dashboard-container">
	        <div class="panel">
	            <h3>Virtual Machines [Node: {{ targetNode }}]</h3>
	            <table class="vm-table">
	                <thead>
	                    <tr>
	                        <th>VMID</th><th>이름</th><th>상태</th><th>액션</th>
	                    </tr>
	                </thead>
	                <tbody>
	                    <tr v-for="vm in vmList" :key="vm.vmid">
	                        <td>{{ vm.vmid }}</td>
	                        <td>{{ vm.name }}</td>
	                        <td>
	                            <span :class="['badge', vm.status === 'running' ? 'on' : 'off']">
	                                {{ vm.status }}
	                            </span>
	                        </td>
	                        <td>
	                            <button class="btn btn-start" @click="controlVm(vm.vmid, 'start')" :disabled="vm.status === 'running'">Start</button>
	                            <button class="btn btn-stop" @click="controlVm(vm.vmid, 'shutdown')" :disabled="vm.status !== 'running'">Shutdown</button>
	                        </td>
	                    </tr>
	                </tbody>
	            </table>
	        </div>

	        <div class="panel terminal-box">
	            <h3>Task Logs ({{ targetUpid || '' }})</h3>
	            
	            <div class="controls" style="margin-bottom: 15px; display: flex; gap: 10px;">
	                <select v-model="targetUpid" @change="onTaskSelect" style="flex-grow: 1; padding: 5px;">
	                    <option disabled value="">조회할 과거 작업을 선택하세요</option>
	                    <option v-for="task in taskList" :key="task.upid" :value="task.upid">
	                        {{ task.displayTitle }} ({{ formatTime(task.timestamp) }})
	                    </option>
	                </select>
	                <button class="btn btn-start" @click="startWatchingLogs" :disabled="isPolling || !targetUpid">로그 추적 시작</button>
	                <button class="btn btn-stop" @click="stopWatchingLogs" :disabled="!isPolling">추적 중지</button>
	            </div>

	            <div class="log-content">
	                <p v-for="log in taskLogs" :key="log.n">> {{ log.t }}</p>
	                <p v-if="isPolling" class="blinking-cursor">_</p>
	            </div>
	        </div>
	    </div>

    <script src="/js/app.js"></script>
</body>
</html>
