<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="/css/app.css">
	<link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>
<body>
    <div id="app">
        <div class="terminal-box">
				<h3>Proxmox Task Log [Node: {{ targetNode }}]</h3>
            <div class="controls">
				<select v-model="targetUpid" @change="onTaskSelect">
					<option disabled value="">조회할 작업을 선택하세요.</option>
					<option v-for="task in taskList" :key="task.upid" :value="task.upid">
						[{{ task.type }}] {{ formatTime(task.starttime) }} - {{ task.status }}
					</option>
				</select>
			</div>
			
            <div class="log-content">
                <p v-for="log in taskLogs" :key="log.n">> {{ log.t }}</p>
                <p v-if="isPolling" class="blinking-cursor">_</p>
            </div>
            
            <div class="controls">
                <button @click="startWatchingLogs" :disabled="isPolling">로그 추적 시작</button>
                <button @click="stopWatchingLogs" :disabled="!isPolling">추적 중지</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
